max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
reorder_imports = true
reorder_modules = true
remove_nested_parens = true
edition = "2021"
merge_derives = true
use_try_shorthand = false
use_field_init_shorthand = false
force_explicit_abi = true
imports_granularity = "Crate"
# The nyanpasu-utils submodule is formatted by its own repo; formatting it
# here would dirty the submodule without a way to commit from the superproject.
ignore = ["crates/nyanpasu-utils"]
